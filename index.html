<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Myroslava Kytsenko</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.logo img{
  height:40px;
  cursor:pointer;
}

.menu{
  display:flex;
  gap:30px;
}

.menu a{
  color:white;
  text-decoration:none;
}

/* HERO */
.hero{
  height:100vh;
  position:relative;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), #000);
}

.hero-content{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

h1{
  font-family:'Playfair Display';
  font-size:70px;
}

/* VIDEO */
section{
  padding:100px 20px;
  max-width:1400px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:25px;
}

.card{
  position:relative;
  cursor:pointer;
}

.card img{
  width:100%;
  display:block;
  transition:0.3s;
}

.card:hover img{
  transform:scale(1.05);
}

.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  color:white;
  opacity:0.8;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  z-index:2000;
}

.modal iframe{
  width:80%;
  height:80%;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <div class="logo" onclick="location.reload()">
    <img src="logo.png">
  </div>

  <div class="menu">
    <a href="#about">About</a>
    <a href="#video">Video</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<div class="hero">
  <img src="photo.jpg">
  <div class="hero-content">
    <h1>Myroslava Kytsenko</h1>
  </div>
</div>

<section id="video">

<div class="grid">

<div class="card" onclick="openVideo('1175635917')">
  <img src="https://vumbnail.com/1175635917.jpg">
  <div class="play">▶</div>
</div>

<div class="card" onclick="openVideo('1175636675')">
  <img src="https://vumbnail.com/1175636675.jpg">
  <div class="play">▶</div>
</div>

<div class="card" onclick="openVideo('1175636942')">
  <img src="https://vumbnail.com/1175636942.jpg">
  <div class="play">▶</div>
</div>

<div class="card" onclick="openVideo('1175637161')">
  <img src="https://vumbnail.com/1175637161.jpg">
  <div class="play">▶</div>
</div>

<div class="card" onclick="openVideo('1175641968')">
  <img src="https://vumbnail.com/1175641968.jpg">
  <div class="play">▶</div>
</div>

<div class="card" onclick="openVideo('1175637986')">
  <img src="https://vumbnail.com/1175637986.jpg">
  <div class="play">▶</div>
</div>

<div class="card" onclick="openVideo('1175638247')">
  <img src="https://vumbnail.com/1175638247.jpg">
  <div class="play">▶</div>
</div>

<div class="card" onclick="openVideo('1175638708')">
  <img src="https://vumbnail.com/1175638708.jpg">
  <div class="play">▶</div>
</div>

<div class="card" onclick="openVideo('1175639272')">
  <img src="https://vumbnail.com/1175639272.jpg">
  <div class="play">▶</div>
</div>

</div>

</section>

<div class="modal" id="modal" onclick="closeVideo()">
  <span class="close">✖</span>
  <iframe id="player" allow="autoplay"></iframe>
</div>

<script>
function openVideo(id){
  document.getElementById("modal").style.display="flex";
  document.getElementById("player").src="https://player.vimeo.com/video/"+id+"?autoplay=1";
}

function closeVideo(){
  document.getElementById("modal").style.display="none";
  document.getElementById("player").src="";
}
</script>

</body>
</html>
