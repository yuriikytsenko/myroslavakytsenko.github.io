<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video Test PRO</title>

<style>
body{
  background:black;
  color:white;
  font-family:Arial;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  cursor:pointer;
}

.preview{
  position:relative;
  width:100%;
  height:200px;
  overflow:hidden;
}

.preview img,
.preview iframe{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  top:0;
  left:0;
}

/* iframe hidden */
.preview iframe{
  opacity:0;
  pointer-events:none;
}

/* hover → показує відео */
.card:hover iframe{
  opacity:1;
}

/* TITLE */
.title{
  margin-top:8px;
  font-size:14px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
}

.modal iframe{
  width:80%;
  height:80%;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1 style="text-align:center;">VIDEO TEST</h1>

<div class="grid">

<!-- MODAL -->
<div class="modal" id="modal">
  <span class="close" onclick="closeVideo()">✖</span>
  <iframe id="player"></iframe>
</div>

<script>
function openVideo(id){
  let modal = document.getElementById("modal");
  let player = document.getElementById("player");

  modal.style.display = "flex";
  player.src = "https://player.vimeo.com/video/" + id + "?autoplay=1";
}

function closeVideo(){
  let modal = document.getElementById("modal");
  let player = document.getElementById("player");

  modal.style.display = "none";
  player.src = "";
}
</script>
