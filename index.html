<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myroslava Kytsenko</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial;
  background:#000;
  color:#fff;
}

/* HERO */
.hero{
  height:100vh;
  position:relative;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero h1{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:50px;
}

/* GRID */
section{
  padding:80px 20px;
  max-width:1200px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

.card{
  cursor:pointer;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.video-box{
  width:80%;
  height:80%;
}

.video-box iframe{
  width:100%;
  height:100%;
  border:none;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="photo.jpg">
  <h1>Myroslava Kytsenko</h1>
</div>

<!-- VIDEO -->
<section>
<div class="grid">

<div class="card" onclick="openVideo('1175635917')">
<img src="https://vumbnail.com/1175635917.jpg">
</div>

<div class="card" onclick="openVideo('1175636675')">
<img src="https://vumbnail.com/1175636675.jpg">
</div>

<div class="card" onclick="openVideo('1175636942')">
<img src="https://vumbnail.com/1175636942.jpg">
</div>

<div class="card" onclick="openVideo('1175637161')">
<img src="https://vumbnail.com/1175637161.jpg">
</div>

<div class="card" onclick="openVideo('1175641968')">
<img src="https://vumbnail.com/1175641968.jpg">
</div>

<div class="card" onclick="openVideo('1175637986')">
<img src="https://vumbnail.com/1175637986.jpg">
</div>

<div class="card" onclick="openVideo('1175638247')">
<img src="https://vumbnail.com/1175638247.jpg">
</div>

<div class="card" onclick="openVideo('1175638708')">
<img src="https://vumbnail.com/1175638708.jpg">
</div>

<div class="card" onclick="openVideo('1175639272')">
<img src="https://vumbnail.com/1175639272.jpg">
</div>

</div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <span class="close" onclick="closeVideo()">✖</span>

  <div class="video-box">
    <iframe id="player" allow="autoplay; fullscreen"></iframe>
  </div>
</div>

<script>
function openVideo(id){
  const modal = document.getElementById("modal");
  const player = document.getElementById("player");

  modal.style.display = "flex";

  // даємо браузеру час відкрити modal
  setTimeout(()=>{
    player.src = "https://player.vimeo.com/video/" + id + "?autoplay=1";
  }, 50);
}

function closeVideo(){
  const modal = document.getElementById("modal");
  const player = document.getElementById("player");

  modal.style.display = "none";
  player.src = "";
}
</script>

</body>
</html>
