<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Myroslava Kytsenko | Violinist</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0a0a0a;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('photo.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero::after {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.hero-content {
  position:relative;
  text-align:center;
  animation: fadeUp 1.5s ease;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 60px;
}

.subtitle {
  color: #c9a24a;
}

/* SECTION */
section {
  padding: 80px 20px;
  max-width: 1100px;
  margin: auto;
}

/* VIDEO GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
  gap: 30px;
}

.card {
  background: #111;
  padding: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

iframe {
  width: 100%;
  height: 200px;
}

.title {
  margin-top:10px;
  font-weight:500;
}

/* LANG */
.lang {
  position:fixed;
  top:20px;
  right:20px;
}

.lang button {
  background:none;
  border:1px solid #c9a24a;
  color:#c9a24a;
  margin:5px;
  cursor:pointer;
}

/* ANIM */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="lang">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('de')">DE</button>
  <button onclick="setLang('ua')">UA</button>
</div>

<div class="hero">
  <div class="hero-content">
    <h1>Myroslava Kytsenko</h1>
    <div class="subtitle" id="title"></div>
  </div>
</div>

<section>
  <h2 id="about-title"></h2>
  <p id="about-text"></p>
</section>

<section>
  <h2 id="video-title"></h2>

  <div class="grid">

    <!-- 1 -->
    <div class="card">
      <iframe src="https://player.vimeo.com/video/1175635917"></iframe>
      <div class="title">Krabchuk Concerto G Major – Recital Hamburg</div>
    </div>

    <!-- 2 -->
    <div class="card">
      <iframe src="https://player.vimeo.com/video/1175636675"></iframe>
      <div class="title">Vivaldi – Autumn</div>
    </div>

    <!-- 3 -->
    <div class="card">
      <iframe src="https://player.vimeo.com/video/1175636942"></iframe>
      <div class="title">Student Trio in G Major</div>
    </div>

    <!-- 4 -->
    <div class="card">
      <iframe src="https://player.vimeo.com/video/1175637161"></iframe>
      <div class="title">Baklanova – March</div>
    </div>

    <!-- 5 -->
    <div class="card">
      <iframe src="https://player.vimeo.com/video/1175641968"></iframe>
      <div class="title">Masterclass</div>
    </div>

    <!-- 6 -->
    <div class="card">
      <iframe src="https://player.vimeo.com/video/1175637986"></iframe>
      <div class="title">Orchestra Hungarian Dances</div>
    </div>

    <!-- 7 -->
    <div class="card">
      <iframe src="https://player.vimeo.com/video/1175638247"></iframe>
      <div class="title">Solo Concert</div>
    </div>

    <!-- 8 -->
    <div class="card">
      <iframe src="https://player.vimeo.com/video/1175638708"></iframe>
      <div class="title">Baklanova March</div>
    </div>

    <!-- 9 -->
    <div class="card">
      <iframe src="https://player.vimeo.com/video/1175639272"></iframe>
      <div class="title">Chechitka Performance</div>
    </div>

  </div>
</section>

<script>
const content = {
  en: {
    title: "Young Violinist",
    aboutTitle: "About",
    aboutText: "Myroslava Kytsenko is a young Ukrainian violinist from Kharkiv, currently living in Hamburg. At the age of 9, she studies violin and piano with dedication and passion, actively performing in concerts, ensembles, and masterclasses."
  },
  de: {
    title: "Junge Geigerin",
    aboutTitle: "Über",
    aboutText: "Myroslava Kytsenko ist eine junge ukrainische Geigerin aus Charkiw, die derzeit in Hamburg lebt. Mit 9 Jahren lernt sie Violine und Klavier und tritt regelmäßig bei Konzerten und Meisterkursen auf."
  },
  ua: {
    title: "Юна скрипалька",
    aboutTitle: "Про",
    aboutText: "Мирослава Киценко — юна українська скрипалька з Харкова, яка зараз проживає в Гамбурзі. У 9 років вона вивчає скрипку та фортепіано, активно виступає на концертах та бере участь у майстер-класах."
  }
};

function setLang(lang){
  document.getElementById('title').innerText = content[lang].title;
  document.getElementById('about-title').innerText = content[lang].aboutTitle;
  document.getElementById('about-text').innerText = content[lang].aboutText;
}

setLang('en');
</script>

</body>
</html>
