<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Myroslava Kytsenko</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.logo img{
  height:40px;
  cursor:pointer;
}

.menu{
  display:flex;
  gap:30px;
}

.menu a{
  color:white;
  text-decoration:none;
}

/* HERO */
.hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  animation:zoom 6s ease forwards;
}

.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), #000);
}

.hero-content{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  animation:fadeUp 1.5s ease;
}

h1{
  font-family:'Playfair Display';
  font-size:70px;
}

/* SECTION */
section{
  padding:120px 40px;
  max-width:1400px;
  margin:auto;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

/* CARD */
.card{
  position:relative;
  overflow:hidden;
  cursor:pointer;
  border-radius:10px;
}

.card video,
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  transition:0.4s;
}

/* hover zoom */
.card:hover img{
  transform:scale(1.1);
}

/* hover video preview */
.card video{
  position:absolute;
  top:0;
  left:0;
  opacity:0;
}

.card:hover video{
  opacity:1;
}

/* play icon */
.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  color:white;
  pointer-events:none;
}

/* title */
.card-title{
  margin-top:10px;
  font-size:14px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
  z-index:2000;
  animation:fadeIn 0.5s;
}

.video-container{
  width:80%;
  height:80%;
}

.video-container iframe{
  width:100%;
  height:100%;
  border:none;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}

/* ANIMATIONS */
@keyframes fadeUp{
  from{opacity:0; transform:translate(-50%,-30%)}
  to{opacity:1; transform:translate(-50%,-50%)}
}

@keyframes zoom{
  to{transform:scale(1)}
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}
</style>
</head>

<body>

<nav>
  <div class="logo" onclick="location.reload()">
    <img src="logo.png">
  </div>

  <div class="menu">
    <a href="#video">Video</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <img src="photo.jpg">
  <div class="hero-content">
    <h1>Myroslava Kytsenko</h1>
  </div>
</div>

<section id="video">

<div class="grid">

<!-- CARD -->
<div class="card" onclick="openVideo('1175635917')">
  <img src="https://vumbnail.com/1175635917.jpg">
  <video muted loop preload="none">
    <source src="https://player.vimeo.com/progressive_redirect/playback/1175635917/rendition/540p/file.mp4" type="video/mp4">
  </video>
  <div class="play">▶</div>
  <div class="card-title">Concerto G Major</div>
</div>

<div class="card" onclick="openVideo('1175636675')">
  <img src="https://vumbnail.com/1175636675.jpg">
  <video muted loop preload="none">
    <source src="https://player.vimeo.com/progressive_redirect/playback/1175636675/rendition/540p/file.mp4" type="video/mp4">
  </video>
  <div class="play">▶</div>
  <div class="card-title">Vivaldi Autumn</div>
</div>

<div class="card" onclick="openVideo('1175636942')">
  <img src="https://vumbnail.com/1175636942.jpg">
  <video muted loop preload="none">
    <source src="https://player.vimeo.com/progressive_redirect/playback/1175636942/rendition/540p/file.mp4" type="video/mp4">
  </video>
  <div class="play">▶</div>
  <div class="card-title">Trio</div>
</div>

<!-- додай інші аналогічно -->

</div>

</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <span class="close" onclick="closeVideo()">✖</span>
  <div class="video-container">
    <iframe id="player" allow="autoplay"></iframe>
  </div>
</div>

<script>
function openVideo(id){
  document.getElementById("modal").style.display="flex";
  document.getElementById("player").src="https://player.vimeo.com/video/"+id+"?autoplay=1";
}

function closeVideo(){
  document.getElementById("modal").style.display="none";
  document.getElementById("player").src="";
}

/* hover video play */
document.querySelectorAll(".card").forEach(card=>{
  const video = card.querySelector("video");
  card.addEventListener("mouseenter",()=>video.play());
  card.addEventListener("mouseleave",()=>{
    video.pause();
    video.currentTime=0;
  });
});
</script>

</body>
</html>
