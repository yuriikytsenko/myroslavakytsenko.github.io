<!DOCTYPE html>

<title>Video Working</title>

<style>
body{

}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

}

.card{

}

.card img{

}

.title{

}
</style>
</head>
