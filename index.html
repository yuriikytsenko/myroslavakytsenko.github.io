<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myroslava Kytsenko</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  cursor:pointer;
}

.preview{
  position:relative;
}

.preview img{
  width:100%;
  height:200px;
  object-fit:cover;
}

/* hover video */
.preview iframe{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  opacity:0;
}

.card:hover iframe{
  opacity:1;
}

.title{
  margin-top:8px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.video-box{
  width:90%;
  height:90%;
}

.video-box iframe{
  width:100%;
  height:100%;
  border:none;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1 style="text-align:center;">Myroslava Kytsenko</h1>

<div class="grid">

<!-- MODAL -->
<div class="modal" id="modal">

<div class="video-box">
<iframe id="player" allow="autoplay; fullscreen"></iframe>
</div>

<script>
function openVideo(id){
document.getElementById("modal").style.display="flex";

document.getElementById("player").src =
"https://player.vimeo.com/video/" + id +
"?autoplay=1&muted=0&controls=1";
}

function closeVideo(){
document.getElementById("modal").style.display="none";
document.getElementById("player").src="";
}
</script>
