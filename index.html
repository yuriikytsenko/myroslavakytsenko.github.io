<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myroslava Kytsenko</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
}

/* LOADER */
.loader{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loader span{
  font-size:30px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{opacity:0.3}
  50%{opacity:1}
  100%{opacity:0.3}
}

/* HERO VIDEO */
.hero{
  position:relative;
  height:100vh;
  overflow:hidden;
}

.hero iframe{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.hero h1{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-family:'Playfair Display';
  font-size:60px;
}

/* GRID */
section{
  padding:100px 40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
}

.card{
  cursor:pointer;
}

.preview{
  position:relative;
  overflow:hidden;
}

.preview img{
  width:100%;
  height:200px;
  object-fit:cover;
  transition:0.4s;
}

.card:hover img{
  transform:scale(1.1);
}

/* hover video */
.preview iframe{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  opacity:0;
}

.card:hover iframe{
  opacity:1;
}

.title{
  margin-top:10px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
}

.modal iframe{
  width:80%;
  height:80%;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="loader" id="loader">
<span>MK</span>
</div>

<!-- HERO VIDEO -->
<div class="hero">
<iframe src="https://player.vimeo.com/video/1175635917?background=1&autoplay=1&muted=1&loop=1"></iframe>

<!-- MODAL -->
<div class="modal" id="modal">
<span class="close" onclick="closeVideo()">✖</span>
<iframe id="player"></iframe>
</div>

<script>
function openVideo(id){
document.getElementById("modal").style.display="flex";
document.getElementById("player").src="https://player.vimeo.com/video/"+id+"?autoplay=1";
}

function closeVideo(){
document.getElementById("modal").style.display="none";
document.getElementById("player").src="";
}

/* LOADER */
window.onload = () => {
  document.getElementById("loader").style.display="none";
}
</script>
