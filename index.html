<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Myroslava Kytsenko</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b0b0b;
  color:white;
}

/* HERO */
.hero {
  height:100vh;
  background:url('photo.jpg') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.hero::after {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
}

.hero-content {
  position:relative;
  text-align:center;
  animation:fadeUp 1.5s;
}

h1 {
  font-family:'Playfair Display';
  font-size:60px;
}

.subtitle {
  color:#c9a24a;
  font-size:20px;
}

/* LANG */
.lang {
  position:fixed;
  top:20px;
  right:20px;
  z-index:10;
}

.lang button {
  background:none;
  border:1px solid #c9a24a;
  color:#c9a24a;
  margin:5px;
  padding:5px 10px;
  cursor:pointer;
}

/* SECTION */
section {
  padding:80px 20px;
  max-width:1200px;
  margin:auto;
}

/* NETFLIX GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.card {
  position:relative;
  overflow:hidden;
  cursor:pointer;
}

.card img {
  width:100%;
  display:block;
  transition:0.4s;
}

.card:hover img {
  transform:scale(1.1);
}

.card::after {
  content:"▶";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  opacity:0;
  transition:0.3s;
}

.card:hover::after {
  opacity:1;
}

.card-title {
  margin-top:10px;
  font-size:14px;
}

/* MODAL VIDEO */
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:100;
}

.modal iframe {
  width:80%;
  height:80%;
}

.close {
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}

/* ANIMATION */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="lang">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('de')">DE</button>
  <button onclick="setLang('ua')">UA</button>
</div>

<div class="hero">
  <div class="hero-content">
    <h1>Myroslava Kytsenko</h1>
    <div class="subtitle" id="title"></div>
  </div>
</div>

<section>
  <h2 id="about-title"></h2>
  <p id="about-text"></p>
</section>

<section>
  <h2>Performances</h2>

  <div class="grid">

    <div class="card" onclick="openVideo('1175635917')">
      <img src="https://i.vimeocdn.com/video/placeholder.jpg">
      <div class="card-title">Concerto G Major – Hamburg</div>
    </div>

    <div class="card" onclick="openVideo('1175636675')">
      <img src="https://i.vimeocdn.com/video/placeholder.jpg">
      <div class="card-title">Vivaldi Autumn</div>
    </div>

    <div class="card" onclick="openVideo('1175636942')">
      <img src="https://i.vimeocdn.com/video/placeholder.jpg">
      <div class="card-title">Trio in G Major</div>
    </div>

  </div>
</section>

<div class="modal" id="modal">
  <span class="close" onclick="closeVideo()">✖</span>
  <iframe id="player" src=""></iframe>
</div>

<script>
const content = {
  en: {
    title:"Young Violinist",
    aboutTitle:"About",
    aboutText:"Myroslava Kytsenko is a young Ukrainian violinist from Kharkiv, currently living in Hamburg."
  },
  de: {
    title:"Junge Geigerin",
    aboutTitle:"Über",
    aboutText:"Myroslava Kytsenko ist eine junge Geigerin aus Charkiw."
  },
  ua: {
    title:"Юна скрипалька",
    aboutTitle:"Про",
    aboutText:"Мирослава Киценко — юна скрипалька з Харкова."
  }
};

function setLang(lang){
  document.getElementById('title').innerText = content[lang].title;
  document.getElementById('about-title').innerText = content[lang].aboutTitle;
  document.getElementById('about-text').innerText = content[lang].aboutText;
}

function openVideo(id){
  document.getElementById("modal").style.display="flex";
  document.getElementById("player").src="https://player.vimeo.com/video/"+id;
}

function closeVideo(){
  document.getElementById("modal").style.display="none";
  document.getElementById("player").src="";
}

setLang('en');
</script>

</body>
</html>
