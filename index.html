<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myroslava Kytsenko</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:'Inter',sans-serif;
}

/* INTRO SCREEN */
.intro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity 1s ease;
}

.title{
  font-family:'Playfair Display';
  font-size:40px;
  letter-spacing:1px;
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 1.2s ease forwards;
}

.subtitle{
  margin-top:10px;
  font-size:14px;
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 1.2s ease forwards;
  animation-delay:0.4s;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:30px;
  opacity:0;
  transition:opacity 1s ease;
}

iframe{
  width:100%;
  height:190px;
  border:none;
  border-radius:8px;
}

/* ANIMATION */
@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <div class="title">Myroslava Kytsenko</div>
  <div class="subtitle">Teacher: Oksana Agapova</div>
</div>

<!-- VIDEO -->
<div class="grid" id="content">

<iframe src="https://www.youtube.com/embed/fLeX5BWDTrk"></iframe>
<iframe src="https://www.youtube.com/embed/5Qdg341-NO0"></iframe>
<iframe src="https://www.youtube.com/embed/s-0rTVOnJfs"></iframe>
<iframe src="https://www.youtube.com/embed/UWajMAdGNY4"></iframe>
<iframe src="https://www.youtube.com/embed/5hW_-r27Zoc"></iframe>
<iframe src="https://www.youtube.com/embed/-4cDxGDxIcs"></iframe>
<iframe src="https://www.youtube.com/embed/nfAB7wO_eAo"></iframe>
<iframe src="https://www.youtube.com/embed/kJIWrMfiQcQ"></iframe>
<iframe src="https://www.youtube.com/embed/BmMqo4XFxvc"></iframe>

</div>

<script>
setTimeout(()=>{
  document.getElementById("intro").style.opacity="0";

  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("content").style.opacity="1";
  },1000);

},2500);
</script>

</body>
</html>
